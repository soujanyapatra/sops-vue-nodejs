name: Decrypt and Deploy CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install Mozilla SOPS binary
      - name: Install SOPS
        run: |
          SOPS_VER="v3.9.0"
          echo "Downloading SOPS $SOPS_VER..."
          curl -LO "https://github.com/getsops/sops/releases/download/${SOPS_VER}/sops-${SOPS_VER}.linux.amd64"
          sudo mv sops-${SOPS_VER}.linux.amd64 /usr/local/bin/sops
          sudo chmod +x /usr/local/bin/sops
          sops --version

      # Step 4: Install AGE Cryptography tool
      - name: Install AGE
        run: |
          echo "Installing AGE tool..."
          sudo apt-get update && sudo apt-get install -y age
          age --version

      # Step 5: Restore AGE Private Key from GitHub Secrets
      - name: Restore AGE Private Key
        run: |
          echo "Restoring SOPS/AGE private key..."
          mkdir -p ~/.config/sops/age
          # Write the private key from GitHub Secrets to the default SOPS AGE keys location
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      # Step 6: Decrypt the secrets file and generate the root .env configuration
      - name: Decrypt secrets.enc.yaml
        run: |
          echo "Decrypting secrets to .env..."
          sops --decrypt secrets/secrets.enc.yaml > .env
          # Verify that .env is created and not empty (without printing its contents!)
          if [ -s .env ]; then
            echo "Successfully decrypted secrets to .env"
          else
            echo "Decryption failed or resulting file is empty"
            exit 1
          fi

      # Step 6b: Parse and export environment variables safely to GITHUB_ENV
      - name: Export Secrets to Environment
        run: |
          echo "Parsing and exporting environment variables..."
          node scripts/parse-env.js

      # Step 7: Install package dependencies
      - name: Install Dependencies
        run: |
          echo "Installing root and frontend dependencies..."
          npm run install-all

      # Step 8: Run Lint (TypeScript syntax checks)
      - name: Run Lint
        run: |
          echo "Running typechecks and quality gates..."
          npm run lint

      # Step 9: Run Test suites (Frontend Vitest)
      - name: Run Tests
        run: |
          echo "Executing test suites..."
          npm run test

      # Step 10: Build Frontend static assets
      - name: Build Frontend
        run: |
          echo "Building Vue 3 + TS static files..."
          npm run build

      # Step 11: Deploy Frontend and Serverless Functions to Vercel
      - name: Deploy Applications
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Configuring Vercel Environment Variables..."
          npx vercel env rm NEWS_API_AI_KEY --yes --token=$VERCEL_TOKEN || true
          npx vercel env rm API_KEY --yes --token=$VERCEL_TOKEN || true
          npx vercel env rm ENVIRONMENT --yes --token=$VERCEL_TOKEN || true

          npx vercel env add NEWS_API_AI_KEY production --value "$NEWS_API_AI_KEY" --token=$VERCEL_TOKEN --yes
          npx vercel env add API_KEY production --value "$API_KEY" --token=$VERCEL_TOKEN --yes
          npx vercel env add ENVIRONMENT production --value "$ENVIRONMENT" --token=$VERCEL_TOKEN --yes


          echo "Deploying to Vercel..."
          npx vercel --prod --token=$VERCEL_TOKEN --yes --build-env VITE_PROJECT_NAME="The Chronicles"





